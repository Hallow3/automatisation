services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped

    expose:
      - "5678"

    environment:
      DB_TYPE: mysqldb
      DB_MYSQLDB_HOST: mysql
      DB_MYSQLDB_PORT: 3306
      DB_MYSQLDB_DATABASE: n8n
      DB_MYSQLDB_USER: root
      DB_MYSQLDB_PASSWORD: ${MYSQL_ROOT_PASSWORD}

      N8N_HOST: n8n.jurinex.cloud
      N8N_PORT: 5678
      N8N_PROTOCOL: https

      GENERIC_TIMEZONE: Africa/Douala

      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}

      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD}

      N8N_COMMUNITY_PACKAGES_ENABLED: "true"
      N8N_UNVERIFIED_PACKAGES_ENABLED: "true"

      N8N_WEBHOOK_URL: https://n8n.jurinex.cloud/

      N8N_RUNNERS_TASK_TIMEOUT: 300
      N8N_COMPRESSION_NODE_MAX_DECOMPRESSED_SIZE_BYTES: 2147483648
      N8N_COMPRESSION_NODE_MAX_ZIP_ENTRIES: 5000

    volumes:
      - n8n_data:/home/node/.n8n

    networks:
      - app-network

volumes:
  n8n_data:
    external: true

networks:
  app-network:
    external: true
