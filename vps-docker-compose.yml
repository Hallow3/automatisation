services:
  mysql:
    image: mysql:8.0
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: keycloak
      MYSQL_USER: keycloak
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app-network
    restart: unless-stopped

  temporal:
    image: temporalio/auto-setup:latest
    container_name: temporal
    depends_on:
      - mysql
    environment:
      - DB=mysql8
      - DB_PORT=3306
      - MYSQL_USER=root
      - MYSQL_PWD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_SEEDS=mysql
    ports:
      - "7233:7233"
    networks:
      - app-network
    restart: unless-stopped

  temporal-ui:
    image: temporalio/ui:latest
    container_name: temporal-ui
    depends_on:
      - temporal
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:3000
    networks:
      - app-network
    restart: unless-stopped
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: phpmyadmin
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    depends_on:
      - mysql
    networks:
      - app-network
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:23.0
    container_name: keycloak
    environment:
      KC_DB: mysql
      KC_DB_URL: jdbc:mysql://mysql:3306/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${MYSQL_PASSWORD}
      KC_HOSTNAME: keycloak.${DOMAIN_NAME}
      KC_HOSTNAME_STRICT: false
      KC_HTTP_ENABLED: true
      KC_PROXY: edge
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    command:
      - start
      - --spi-theme-static-max-age=-1
      - --spi-theme-cache-themes=false
      - --spi-theme-cache-templates=false
    depends_on:
      - mysql
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ./themes/jurinex:/opt/keycloak/themes/jurinex:ro
    networks:
      - app-network
    restart: unless-stopped
  minio:
    image: minio/minio:latest
    container_name: minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - app-network
    restart: unless-stopped

  https-portal:
    image: steveltn/https-portal:1
    container_name: https-portal
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAINS: 'keycloak.${DOMAIN_NAME} -> http://keycloak:8080, minio.${DOMAIN_NAME} -> http://minio:9001, minio-api.${DOMAIN_NAME} -> http://minio:9000, phpmyadmin.${DOMAIN_NAME} -> http://phpmyadmin:80, temporal.${DOMAIN_NAME} -> http://temporal-ui:8080, n8n.${DOMAIN_NAME} -> http://n8n:5678'
      STAGE: 'production'
    volumes:
      - https-portal-data:/var/lib/https-portal
    depends_on:
      - keycloak
      - minio
      - phpmyadmin
      - temporal-ui
    networks:
      - app-network
    restart: unless-stopped

volumes:
  mysql_data:
    external: true
  keycloak_data:
    external: true
  minio_data:
    external: true
  https-portal-data:
    external: true

networks:
  app-network:
    external: true